<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Car Detail</title>
    <link rel="stylesheet" href="css/detail.css" />
  </head>

  <body>
    <div class="page">
      <a href="index.html" class="back-btn">⬅ Back</a>

      <div class="detail-wrapper">
        <!-- LEFT -->
        <div class="detail-left">
          <div class="car-top">
            <img id="car-image" class="detail-image" />

            <div class="car-info">
              <h2 id="car-title"></h2>
              <p id="car-desc"></p>
            </div>
          </div>
        </div>

      </div>

      <div class="cost-box">
        <h3>คำนวณค่าใช้จ่ายคร่าว ๆ</h3>

        <div class="form-row">
          <div class="form-group">
            <label>ระยะเวลาการใช้งาน (ปี)</label>
            <input id="years" type="number" value="5" />
          </div>

          <div class="form-group">
            <label>ค่าประกัน ต่อปี</label>
            <input id="insurance" type="number" value="25000" step="1000" />
          </div>

          <div class="form-group">
            <label>ค่าบำรุงรักษา ต่อปี</label>
            <input id="maintenance" type="number" value="5000" step="1000" />
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="js/detail.js"></script>
  </body>
</html>
