<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Car Detail</title>
    <link rel="stylesheet" href="css/detail.css" />
  </head>

  <body>
    <div class="page">
      <a href="index.html" class="back-btn">⬅ Back</a>

      <div class="detail-wrapper">
        <!-- LEFT -->
        <div class="detail-left">
          <div class="car-top">
            <img id="car-image" class="detail-image" />

            <div class="car-info">
              <h2 id="car-title"></h2>
              <p id="car-desc"></p>
            </div>
          </div>

          <!-- spec -->
          
        </div>

        <!-- RIGHT -->
        <div class="detail-right">
          <div class="npv-card">
            <h3>NPV Calculator</h3>

            <div class="form-group">
              <label>Years</label>
              <input id="years" type="number" value="5" />
            </div>

            <div class="form-group">
              <label>Insurance</label>
              <input id="insurance" type="number" value="25000" />
            </div>

            <div class="form-group">
              <label>Maintenance</label>
              <input id="maintenance" type="number" value="5000" />
            </div>

            <div class="npv-box">
              <h2 id="npv-result">NPV: -</h2>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="js/detail.js"></script>
  </body>
</html>
