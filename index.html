<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>EV Car Finder</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="container">
      <!-- ===== SIDEBAR (BRAND FILTER) ===== -->
      <div class="filter-box">
        <h3>FILTER</h3>

        <h4>Filter by Brand</h4>

        <label class="checkbox-item"
          ><input type="checkbox" value="Audi" class="brand" />
          <span>Audi</span></label
        >
        <label class="checkbox-item"
          ><input type="checkbox" value="BMW" class="brand" />
          <span>BMW</span></label
        >
        <label class="checkbox-item"
          ><input type="checkbox" value="BYD" class="brand" />
          <span>BYD</span></label
        >
        <label class="checkbox-item"
          ><input type="checkbox" value="Honda" class="brand" />
          <span>Honda</span></label
        >
        <label class="checkbox-item"
          ><input type="checkbox" value="MG" class="brand" />
          <span>MG</span></label
        >
        <label class="checkbox-item"
          ><input type="checkbox" value="Nissan" class="brand" />
          <span>Nissan</span></label
        >
        <label class="checkbox-item"
          ><input type="checkbox" value="Tesla" class="brand" />
          <span>Tesla</span></label
        >
        <label class="checkbox-item"
          ><input type="checkbox" value="Toyota" class="brand" />
          <span>Toyota</span></label
        >
        <label class="checkbox-item"
          ><input type="checkbox" value="Volvo" class="brand" />
          <span>Volvo</span></label
        >

        <h4>Filter by Color</h4>

        <label class="checkbox-item">
          <input type="checkbox" value="black" class="color" />
          <span>Black</span>
        </label>

        <label class="checkbox-item">
          <input type="checkbox" value="white" class="color" />
          <span>White</span>
        </label>

        <label class="checkbox-item">
          <input type="checkbox" value="grey" class="color" />
          <span>Grey</span>
        </label>

        <label class="checkbox-item">
          <input type="checkbox" value="silver" class="color" />
          <span>Silver</span>
        </label>

        <label class="checkbox-item">
          <input type="checkbox" value="blue" class="color" />
          <span>Blue</span>
        </label>

        <label class="checkbox-item">
          <input type="checkbox" value="red" class="color" />
          <span>Red</span>
        </label>

        <label class="checkbox-item">
          <input type="checkbox" value="green" class="color" />
          <span>Green</span>
        </label>

        <label class="checkbox-item">
          <input type="checkbox" value="yellow" class="color" />
          <span>Yellow</span>
        </label>

        <label class="checkbox-item">
          <input type="checkbox" value="beige" class="color" />
          <span>Beige</span>
        </label>

        <label class="checkbox-item">
          <input type="checkbox" value="pink" class="color" />
          <span>Pink</span>
        </label>

        <label class="checkbox-item">
          <input type="checkbox" value="other" class="color" />
          <span>Other</span>
        </label>
      </div>

      <!-- ===== MAIN SECTION ===== -->
      <div class="main-section">
        <!-- ===== TOP FILTER ===== -->
        <div class="top-filter">
          <!-- HEADER -->
          <div class="filter-header">
            <h3>Write Something ...</h3>
            <p>Write Something (description) ...</p>
          </div>

          <!-- FILTER ROW -->
          <div class="filter-row">
            <!-- PRIMARY USE -->
            <div class="filter-item">
              <label for="cluster">Car Type</label>
              <select id="cluster">
                <option value="">Select usage...</option>
                <option value="0">All-round</option>
                <option value="1">Local</option>
                <option value="2">Long Range</option>
                <option value="3">City</option>
              </select>
            </div>

            <!-- BUDGET -->
            <div class="filter-item">
              <label for="budget">Budget</label>
              <input id="budget" type="text" placeholder="e.g. ฿1,000,000" />
            </div>

            <div class="filter-item">
              <label for="sort">Sort by Price</label>
              <select id="sort">
                <option value="">Default</option>
                <option value="asc">Price: Low → High</option>
                <option value="desc">Price: High → Low</option>
              </select>
            </div>

            <!-- BUTTON -->
            <button id="recommend-btn" class="recommend-btn">
              Find Ev Cars
            </button>
          </div>
        </div>

        <!-- ===== CAR LIST ===== -->
        <div id="car-list" class="car-grid"></div>
      </div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
