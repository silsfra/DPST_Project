<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>EV Car Finder</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">

        <div class="filter-box">
            <h3>Filter by Brand</h3>

            <label class="checkbox-item">
                <input type="checkbox" value="Audi" class="brand">
                <span>Audi</span>
            </label>

            <label class="checkbox-item">
                <input type="checkbox" value="BMW" class="brand">
                <span>BMW</span>
            </label>

            <label class="checkbox-item">
                <input type="checkbox" value="BYD" class="brand">
                <span>BYD</span>
            </label>

            <label class="checkbox-item">
                <input type="checkbox" value="Honda" class="brand">
                <span>Honda</span>
            </label>

            <label class="checkbox-item">
                <input type="checkbox" value="MG" class="brand">
                <span>MG</span>
            </label>

            <label class="checkbox-item">
                <input type="checkbox" value="Nissan" class="brand">
                <span>Nissan</span>
            </label>

            <label class="checkbox-item">
                <input type="checkbox" value="Tesla" class="brand">
                <span>Tesla</span>
            </label>

            <label class="checkbox-item">
                <input type="checkbox" value="Toyota" class="brand">
                <span>Toyota</span>
            </label>

            <label class="checkbox-item">
                <input type="checkbox" value="Volvo" class="brand">
                <span>Volvo</span>
            </label>

        </div>

        <div id="car-list" class="car-grid"></div>

    </div>

    <script type="module" src="js/main.js"></script>

</body>

</html>
