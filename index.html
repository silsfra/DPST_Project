<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>EV Car Finder</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="navbar">
        <h2>⚡ EV Car Finder</h2>
    </header>

    <div class="container">

        <div class="filter-box">
            <h3>Filter</h3>

            <label>💰 Max Price</label>
            <input type="number" id="price" value="1000000">

            <label>🔋 Min Range</label>
            <input type="number" id="range" value="300">

            <button id="filterBtn">Apply Filter</button>
        </div>

        <div id="car-list" class="car-grid"></div>

    </div>

    <script type="module" src="js/main.js"></script>

</body>

</html>
